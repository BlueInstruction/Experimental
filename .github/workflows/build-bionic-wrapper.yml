name: Build Bionic Vulkan Wrapper

on:
  workflow_dispatch:

env:
  WRAPPER_REPO: 'https://github.com/BlueInstruction/bionic-vulkan-wrapper.git'
  WRAPPER_BRANCH: 'wrapper'
  TERMUX_PKG_REPO: 'https://github.com/leegao/vulkan_wrapper_termux-packages.git'

jobs:
  build:
    name: Build via termux-packages
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y zstd curl git

      - name: Clone termux-packages build system
        run: |
          git clone --depth=1 "$TERMUX_PKG_REPO" termux-build
          echo "=== Termux repo structure ==="
          find termux-build -maxdepth 3 -type f -name "*.sh" | sort
          echo ""
          echo "=== Looking for build instructions ==="
          find termux-build -name "build.sh" -exec echo "--- {} ---" \; -exec cat {} \;
          find termux-build -name "Makefile" -exec echo "--- {} ---" \; -exec cat {} \;
          find termux-build -name "Dockerfile*" -exec echo "--- {} ---" \; -exec cat {} \;
          find termux-build -name "*.yml" -exec echo "--- {} ---" \; -exec cat {} \;
          echo ""
          echo "=== README ==="
          cat termux-build/README* 2>/dev/null || true

      - name: Build using termux-packages
        run: |
          cd termux-build
          # Try the standard termux-packages build flow
          if [ -f "Makefile" ]; then
            make || true
          elif [ -f "build.sh" ]; then
            bash build.sh || true
          elif [ -f "scripts/run-docker.sh" ]; then
            bash scripts/run-docker.sh || true
          else
            echo "Attempting termux-packages standard build..."
            # Standard termux-packages uses ./build-package.sh
            if [ -f "build-package.sh" ]; then
              bash build-package.sh vulkan-wrapper || bash build-package.sh -a aarch64 vulkan-wrapper || true
            fi
          fi
          echo ""
          echo "=== Build output ==="
          find . -name "libvulkan_wrapper*" -o -name "*.deb" -o -name "*.tzst" | sort
          find . -name "*.so" -type f -exec ls -lh {} \; | sort -k5 -h

      - name: Collect artifacts
        run: |
          mkdir -p dist
          # Find any built .so or package
          find termux-build -name "libvulkan_wrapper.so" -exec cp {} dist/ \; 2>/dev/null || true
          find termux-build -name "*.deb" -exec cp {} dist/ \; 2>/dev/null || true
          find termux-build -name "wrapper.tzst" -exec cp {} dist/ \; 2>/dev/null || true
          ls -lh dist/ 2>/dev/null || echo "No artifacts found"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wrapper-build-output
          path: dist/
          retention-days: 90
          if-no-files-found: warn
